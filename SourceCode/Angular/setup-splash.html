<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIL POS - Setting up...</title>
    <style>
        :root {
            --primary: #4158D0;
            --secondary: #C850C0;
            --accent: #FFCC70;
            --text-primary: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            color: var(--text-primary);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 450px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 64px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .status-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-detail {
            font-size: 13px;
            opacity: 0.7;
            font-family: 'Consolas', monospace;
        }

        .percentage {
            position: absolute;
            right: 0;
            top: -25px;
            font-size: 14px;
            font-weight: 800;
        }

        .relative { position: relative; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 class="logo">MIL POS</h1>
        <div class="subtitle">Cloud Workspace Setup</div>

        <div class="status-header" id="header">Preparing Download</div>
        
        <div class="relative">
            <div class="percentage" id="percent">0%</div>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
        </div>

        <div class="status-detail" id="detail">Connecting to cloud services...</div>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const percent = document.getElementById('percent');
        const header = document.getElementById('header');
        const detail = document.getElementById('detail');

        // Listen for progress updates from Main Process via IPC
        window.electronAPI.onDownloadProgress((event, data) => {
            const p = Math.min(100, Math.max(0, data.percent || 0));
            bar.style.width = p + '%';
            percent.innerText = p + '%';
            
            if (data.header) header.innerText = data.header;
            if (data.detail) detail.innerText = data.detail;
        });
    </script>
</body>
</html>
