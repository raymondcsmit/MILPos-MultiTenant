<mat-dialog-content>
  <div class="mb-0 d-flex justify-content-between">
    <span class="mb-4 page-title">
      {{ "MANAGE_COUNTRY" | translate }}
      <app-page-help-text code="COUNTRY"></app-page-help-text>
    </span>
    <mat-icon class="close-icon text-danger cursor-pointer" (click)="onCancel()">cancel</mat-icon>
  </div>
  <form [formGroup]="countryForm">
    <div class="row">
      <div class="col-sm-12">
        <div class="form-group">
          <label class="text-danger" for="countryName"> {{"COUNTRY_NAME" | translate}} *</label>
          <input formControlName="countryName" type="text" class="form-control" id="countryName">
          @if(countryForm.get('countryName')?.touched && countryForm.get('countryName')?.errors &&
          countryForm.get('countryName')?.errors?.['required']){
          <div class="text-danger">
            {{'NAME_IS_REQUIRED' | translate}}
          </div>
          }
        </div>
      </div>
    </div>
    <div class="mt-3 d-flex">
      <button *hasClaim="'SETT_MANAGE_COUNTRY'" (click)="saveCountry()" class="success me-2" matButton="filled"
        cdkFocusInitial>
        <mat-icon class="medium-icon fs-5 align-middle">save</mat-icon> {{'SAVE' | translate}}
      </button>
      <button type="button" class="error" (click)="onCancel()" matButton="filled">
        <mat-icon class="medium-icon fs-5 align-middle">cancel</mat-icon> {{'CANCEL' | translate}}
      </button>
    </div>
  </form>
</mat-dialog-content>
