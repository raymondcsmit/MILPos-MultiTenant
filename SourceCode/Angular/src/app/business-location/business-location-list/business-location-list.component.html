<section class="content">
  <div class="container-fluid">
    <div class="d-flex mb-2">
      <div class="me-auto">
        <span class="mb-0 page-title">{{'BUSINESS_LOCATIONS' | translate}}
          <app-page-help-text code="BUSINESS_LOCATIONS"></app-page-help-text>
        </span>
      </div>
      <div class="d-flex justify-content-end">
        <button class="primary me-2" matButton="filled" (click)="manageLocation(null)">
          <mat-icon class="medium-icon fs-5 align-middle">add</mat-icon>
          <span class="d-none d-sm-inline"> {{'ADD_BUSINESS_LOCATION' | translate}} </span>
        </button>
      </div>
    </div>
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="table-responsive">
          <div class="grid-height-large">
            <table [dir]="langDir" mat-table [dataSource]="locations">
              <!-- Action Column -->
              <ng-container matColumnDef="action">
                <th class="table-column-150" mat-header-cell *matHeaderCellDef>{{'ACTION' | translate}}
                </th>
                <td class="table-column-150" mat-cell *matCellDef="let location">
                  <div class="d-flex my-1 gap-2">
                    <button (click)="manageLocation(location)" class="primary me-2" matMiniFab type="button">
                      <mat-icon class="medium-icon fs-5 align-middle">edit</mat-icon>
                    </button>
                    <button (click)="deleteLocation(location)" class="error" matMiniFab type="button">
                      <mat-icon class="medium-icon fs-5 align-middle">delete</mat-icon>
                    </button>
                  </div>
                </td>
              </ng-container>
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> {{'LOCATION_NAME' | translate}} </th>
                <td mat-cell *matCellDef="let location"> {{location.name}} </td>
              </ng-container>

              <ng-container matColumnDef="contactPerson">
                <th mat-header-cell *matHeaderCellDef> {{'CONTACT_PERSON' | translate}} </th>
                <td mat-cell *matCellDef="let location"> {{location.contactPerson}} </td>
              </ng-container>

              <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> {{'EMAIL' | translate}} </th>
                <td mat-cell *matCellDef="let location"> {{location.email}} </td>
              </ng-container>

              <ng-container matColumnDef="mobile">
                <th mat-header-cell *matHeaderCellDef> {{'MOBILE' | translate}} </th>
                <td mat-cell *matCellDef="let location"> {{location.mobile}} </td>
              </ng-container>
              <tr *matNoDataRow>
                <td colspan="9">
                  <span class="p-4 mt-4">
                    <b> {{'NO_DATA_FOUND' | translate}}</b>
                  </span>
                </td>
              </tr>
              <tr class="grid-header-color" mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{
                              'odd-row': isOddDataRow(getDataIndex(row)),
                              'even-row': !isOddDataRow(getDataIndex(row))
                            }"></tr>
            </table>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</section>
