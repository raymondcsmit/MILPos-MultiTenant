<mat-dialog-content>
  <div class="mb-0 d-flex justify-content-between">
    <span class="mb-4 page-title">
      {{ "SEND_EMAIL" | translate }}
    </span>
    <mat-icon class="close-icon text-danger cursor-pointer" (click)="onCancel()">cancel</mat-icon>
  </div>
  <form name="form" [formGroup]="smtpForm" novalidate>
    <div class="row">
      <div class="col-sm-12">
        <label class="form-label text-danger" for="toEmail">{{
          "EMAIL" | translate
          }} <sup>*</sup></label>
        <input required formControlName="toEmail" type="text" name="toEmail" class="form-control" id="toEmail" />
        @if(smtpForm.get('toEmail')?.touched && smtpForm.get('toEmail')?.errors){
        @if(smtpForm.get('toEmail')?.hasError('required')){
        <div class="text-danger">
          {{ "EMAIL_IS_REQUIRED" | translate }}
        </div>
        }
        @if(smtpForm.get('toEmail')?.hasError('email')){
        <div class="text-danger">
          {{ "INVALID_EMAIL" | translate }}
        </div>
        }
        }
      </div>
    </div>
    <div class="row">
      <div class="col-md-12 mt-3">
        <button type="submit" (click)="testSmtpSetting()" class="success me-2" matButton="filled" cdkFocusInitial>
          <mat-icon class="medium-icon fs-5 align-middle">save</mat-icon>
          {{ "SEND" | translate }}
        </button>
        <button type="button" class="error" matButton="filled" (click)="onCancel()">
          <mat-icon class="medium-icon fs-5 align-middle">cancel</mat-icon>
          {{ "CANCEL" | translate }}
        </button>
      </div>
    </div>
  </form>

</mat-dialog-content>
