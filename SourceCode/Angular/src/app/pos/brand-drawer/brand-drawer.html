<div class="drawer" [class.open]="isOpen">
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="row">
        <div class="col-md-12 d-flex justify-content-between align-items-center">
          <h5 class="mt-2 text-dark">
            <mat-icon class="me-2 align-middle text-primary">branding_watermark</mat-icon>
            {{ 'CHOOSE_THE_BRAND' | translate }}
          </h5>
          <button class="btn" (click)="close.emit()">
            <mat-icon class="fs-4 align-middle text-danger">cancel</mat-icon>
          </button>
        </div>
      </div>
      <div class="row" style="max-height: 90vh; overflow-y: auto">
        <!-- <div class="col-sm-12">
          <div
            class="cursor-pointer mt-3 text-dark rounded border shadow-sm list-group-item d-flex align-items-center justify-content-center"
            style="background-color: #fff; font-weight: 600" (click)="onBrandSelected('')"
            [ngClass]="{ 'selected-category': selectedBrandId === '' }">
            <button type="button" class="btn rounded category fw-medium">
              {{ 'ALL_BRANDS' | translate }}
            </button>
          </div>
        </div> -->
        <div class="d-flex flex-wrap gap-1 mt-2">
          @for (a of brands; let i = $index; track $index) {
          <div class="card card-pos cursor-pointer" (click)="onBrandSelected(a.id ?? '')"
            [ngClass]="{ 'selected-category': selectedBrandId === a.id }">
            <div class="text-center card-text">{{ a.name }}</div>
            <div class="card-body d-flex justify-content-center align-items-center">
              @if (a.imageUrl) {
              <img [src]="baseUrl + a.imageUrl" class="img-circle brand-img" />
              } @else {
              <img src="/images/no-preview.jpg" class="img-circle brand-img" alt="{{ 'PRODUCT_IMAGE' | translate }}" />
              }
            </div>
          </div>
          }
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
