<section class="content">
  <div class="container-fluid">
    <div class="d-flex mb-2">
      <div class="me-auto">
        <span class="mb-0 page-title">{{'EMAIL_TEMPLATE' | translate }}
          <app-page-help-text code="EMAIL_TEMPLATE"></app-page-help-text>
        </span>
      </div>
      <div class="d-flex justify-content-end">
        <a *hasClaim="'EMAIL_MANAGE_EMAIL_TEMPLATES'" class="primary me-2" matButton="filled"
          [routerLink]="'/emailtemplate/add'" routerLinkActive="router-link-active">
          <mat-icon class="medium-icon fs-5 align-middle">add</mat-icon>
          <span class="d-none d-sm-inline"> {{'ADD_EMAIL_TEMPLATE' | translate }} </span>
        </a>
      </div>
    </div>
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="grid-height-large">
          <table mat-table [dir]="langDir" [dataSource]="emailTemplates">
            <!-- Action Column -->
            <ng-container matColumnDef="action">
              <th mat-header-cell *matHeaderCellDef>
                {{'ACTION' | translate }}
              </th>
              <td mat-cell *matCellDef="let emailTemplate">
                <div class="d-flex gap-2">
                  <button matMiniFab [routerLink]="['/emailtemplate', emailTemplate.id]"
                    *hasClaim="'EMAIL_MANAGE_EMAIL_TEMPLATES'" class="primary">
                    <mat-icon class="medium-icon fs-5 align-middle">edit</mat-icon>
                  </button>
                  <button matMiniFab (click)="delteEmailTemplate(emailTemplate)"
                    *hasClaim="'EMAIL_MANAGE_EMAIL_TEMPLATES'" class="error">
                    <mat-icon class="medium-icon fs-5 align-middle">delete</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>
            <!-- Key Column -->
            <ng-container matColumnDef="name">
              <th class="table-column-300" mat-header-cell *matHeaderCellDef>
                {{'NAME' | translate }}
              </th>
              <td class="table-column-300" mat-cell *matCellDef="let emailTemplate"> {{emailTemplate.name}} </td>
            </ng-container>
            <!-- Value Column -->
            <ng-container matColumnDef="subject">
              <th class="table-column-300" mat-header-cell *matHeaderCellDef>
                {{'SUBJECT' | translate }}
              </th>
              <td class="table-column-300" mat-cell *matCellDef="let emailTemplate"> {{emailTemplate.subject}} </td>
            </ng-container>

            <tr *matNoDataRow>
              <td colspan="3">
                <span class="p-4 mt-4">
                  <b> {{ "NO_DATA_FOUND" | translate }}</b>
                </span>
              </td>
            </tr>
            <tr class="grid-header-color" mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{
                              'odd-row': isOddDataRow(getDataIndex(row)),
                              'even-row': !isOddDataRow(getDataIndex(row))
                            }"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</section>
