<mat-card appearance="outlined">
  <mat-card-content>
    <div class="row align-items-center justify-content-between">
      <div class="col-md-auto col-sm-auto">
        <div class="section-title">
          <span class="mb-0 page-title-sub">
            {{ 'TAXES' | translate }}
            <app-page-help-text code="TAXES"></app-page-help-text>
          </span>
        </div>
      </div>
    </div>
    <div class="table-responsive">
      <table [dir]="langDir" mat-table [dataSource]="salesOrderTaxItems">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>
            {{ 'NAME' | translate }}
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.taxName }}
          </td>
        </ng-container>
        <ng-container matColumnDef="totalAmount">
          <th mat-header-cell *matHeaderCellDef>{{ 'TOTAL_TAX' | translate }}</th>
          <td mat-cell *matCellDef="let element">
            {{ element.taxValue | customCurrency }}
          </td>
        </ng-container>
        <tr *matNoDataRow>
          <td colspan="9">
            <span class="p-4 mt-4">
              <b> {{ 'NO_DATA_FOUND' | translate }}</b>
            </span>
          </td>
        </tr>
        <tr class="grid-header-color" mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" [ngClass]="{
                              'odd-row': isOddDataRow(getDataIndex(row)),
                              'even-row': !isOddDataRow(getDataIndex(row))
                            }" [class.bg-warning1]="row.status === 1"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
