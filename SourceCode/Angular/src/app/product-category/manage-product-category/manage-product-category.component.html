<mat-dialog-content>
  <div class="mb-0 d-flex justify-content-between">
    <span class="mb-4 page-title">
      {{ "MANAGE_PRODUCT_CATEGORY" | translate }}
      <app-page-help-text code="PRODUCT_CATEGORIES"></app-page-help-text>
    </span>
    <mat-icon class="close-icon text-danger cursor-pointer" (click)="onCancel()">cancel</mat-icon>
  </div>
  <form name="form" [formGroup]="categoryForm" novalidate>
    <div class="row">
      <div class="col-sm-12">
        <div class="form-group">
          <label for="categoryName" class="text-danger">{{ "NAME" | translate }}*</label>
          <input formControlName="name" type="text" class="form-control" id="categoryName" />
          @if(categoryForm.get('name')?.touched &&
          categoryForm.get('name')?.hasError('required')){
          <div class="text-danger">
            {{ "NAME_IS_REQUIRED" | translate }}
          </div>
          }
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-12">
        <div class="form-group">
          <label for="description">{{ "DESCRIPTION" | translate }}</label>
          <textarea formControlName="description" type="text" class="form-control"></textarea>
        </div>
      </div>
    </div>
    <div class="mt-3 col-md-12">
      <button *hasClaim="'PRO_MANAGE_PRO_CAT'" (click)="saveCategory()" type="submit" class="success me-2"
        matButton="filled" cdkFocusInitial>
        <mat-icon class="medium-icon fs-5 align-middle">save</mat-icon>
        {{ "SAVE" | translate }}
      </button>
      <button type="button" class="error" matButton="filled" (click)="onCancel()">
        <mat-icon class="medium-icon fs-5 align-middle">cancel</mat-icon>
        {{ "CANCEL" | translate }}
      </button>
    </div>
  </form>
</mat-dialog-content>
