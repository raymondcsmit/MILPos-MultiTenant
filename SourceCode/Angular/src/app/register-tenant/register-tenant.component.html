<div class="login-container">
  <form [formGroup]="registerForm" (submit)="onSubmit()" class="login-form validate-form">
    <div class="row">
      <h3 class="text-center mb-4">Register New Tenant</h3>
    </div>
    
    <div class="row">
      <div class="col-md-12 mb-2">
        <label class="form-label">Company Name *</label>
        <input class="form-control" formControlName="name" placeholder="Company Name">
        <div *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid" class="text-danger small">
          Name is required
        </div>
      </div>

      <div class="col-md-12 mb-2">
        <label class="form-label">Subdomain *</label>
        <input class="form-control" formControlName="subdomain" placeholder="subdomain (digits and lowercase only)">
        <div *ngIf="registerForm.get('subdomain')?.touched && registerForm.get('subdomain')?.invalid" class="text-danger small">
          Subdomain is required (lowercase letters and numbers only)
        </div>
      </div>

      <div class="col-md-12 mb-2">
        <label class="form-label">Admin Email *</label>
        <input class="form-control" formControlName="adminEmail" placeholder="Email">
        <div *ngIf="registerForm.get('adminEmail')?.touched && registerForm.get('adminEmail')?.invalid" class="text-danger small">
          Valid email is required
        </div>
      </div>

      <div class="col-md-12 mb-2">
        <label class="form-label">Password *</label>
        <div class="input-group">
            <input class="form-control" [type]="fieldTextType ? 'text' : 'password'" formControlName="adminPassword" placeholder="Password">
            <button class="btn btn-outline-secondary" type="button" (click)="fieldTextType = !fieldTextType">
                <mat-icon>{{ fieldTextType ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
        </div>
        <div *ngIf="registerForm.get('adminPassword')?.touched && registerForm.get('adminPassword')?.invalid" class="text-danger small">
          Password is required (min 6 chars)
        </div>
      </div>

      <div class="col-md-12 mb-2">
        <label class="form-label">Phone *</label>
        <input class="form-control" formControlName="phone" placeholder="Phone">
        <div *ngIf="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid" class="text-danger small">
          Phone is required
        </div>
      </div>

      <div class="col-md-12 mb-2">
        <label class="form-label">Address *</label>
        <textarea class="form-control" formControlName="address" placeholder="Address"></textarea>
         <div *ngIf="registerForm.get('address')?.touched && registerForm.get('address')?.invalid" class="text-danger small">
          Address is required
        </div>
      </div>
    </div>

    <div class="row mt-3">
        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
                {{ isLoading ? 'Registering...' : 'Register' }}
            </button>
        </div>
        <div class="col-12 mt-2 text-center">
            <a routerLink="/login">Back to Login</a>
        </div>
    </div>
  </form>
</div>
