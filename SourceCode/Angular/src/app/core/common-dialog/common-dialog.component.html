<mat-dialog-content>
  <div class="mb-0 d-flex justify-content-between">
    <span class="mb-4 page-title">
      {{primaryMessage}}
    </span>
    <mat-icon class="close-icon text-danger ms-3 cursor-pointer" (click)="clickHandler()">cancel</mat-icon>
  </div>
  <div class="d-flex">
    <button mat-raised-button color="primary" class="success me-2" matButton="filled" (click)="clickHandler(true)">
      <mat-icon class="medium-icon fs-5 align-middle">check</mat-icon>
      {{'YES' | translate}}
    </button>
    <button mat-raised-button color="warn" class="error" matButton="filled" (click)="clickHandler(false)">
      <mat-icon class="medium-icon fs-5 align-middle">cancel</mat-icon>
      {{'CANCEL' | translate}}
    </button>
  </div>
</mat-dialog-content>
