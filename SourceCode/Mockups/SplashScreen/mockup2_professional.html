<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIL POS - Professional Dark</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e272e;
            background: linear-gradient(135deg, #1e272e 0%, #2c3e50 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ecf0f1;
            overflow: hidden;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 40px;
        }

        .left-panel {
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 40px;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #bdc3c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 16px;
            color: #95a5a6;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 200px;
        }

        .loader-ring {
            display: inline-block;
            position: relative;
            width: 40px;
            height: 40px;
            margin-bottom: 15px;
        }
        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 32px;
            height: 32px;
            margin: 4px;
            border: 3px solid #3498db;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #3498db transparent transparent transparent;
        }
        .loader-ring div:nth-child(1) { animation-delay: -0.45s; }
        .loader-ring div:nth-child(2) { animation-delay: -0.3s; }
        .loader-ring div:nth-child(3) { animation-delay: -0.15s; }

        .loading-text {
            font-size: 13px;
            color: #bdc3c7;
            font-family: monospace;
        }

        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <div class="left-panel">
            <h1 class="brand-name">MIL POS</h1>
            <div class="brand-sub">Inventory System</div>
        </div>
        <div class="right-panel">
            <div class="loader-ring"><div></div><div></div><div></div><div></div></div>
            <div class="loading-text" id="status">Initializing Core...</div>
        </div>
    </div>
    <div class="version">v1.0.0</div>

    <script>
        const statuses = [
            "Initializing Core...",
            "Loading Modules...",
            "Connecting to Database...",
            "Syncing Inventory...",
            "Starting Application..."
        ];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % statuses.length;
            document.getElementById('status').innerText = statuses[i];
        }, 800);
    </script>
</body>
</html>
