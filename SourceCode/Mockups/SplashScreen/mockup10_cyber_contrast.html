<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIL POS - Cyber Contrast</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Cyber Contrast: Neon Pink to Cyan */
            background: linear-gradient(135deg, #FF0099 0%, #493240 50%, #00FFFF 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 450px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-text {
            font-size: 56px;
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 0px #FF0099, -2px -2px 0px #00FFFF;
            margin: 0;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            margin-bottom: 25px;
        }

        .dots-loader {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #00FFFF;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 10px #00FFFF;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; background: #FF0099; box-shadow: 0 0 10px #FF0099; }
        .dot:nth-child(2) { animation-delay: -0.16s; background: #fff; box-shadow: 0 0 10px #fff; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 13px;
            color: #fff;
            font-family: Consolas, 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 12px;
            min-width: 200px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .footer {
            position: absolute;
            bottom: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 class="logo-text">MIL POS</h1>
        <div class="subtitle">Smart Inventory & Retail System</div>
        
        <div class="dots-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div id="status" class="status-text">Initializing Core...</div>

        <div class="footer">
            &copy; 2026 MIL POS Systems
        </div>
    </div>

    <script>
        const statuses = [
            "Initializing Core...",
            "Loading Modules...",
            "Connecting to Database...",
            "Syncing Inventory...",
            "Verifying License...",
            "Starting Application..."
        ];
        
        let i = 0;
        const statusEl = document.getElementById('status');
        
        setInterval(() => {
            i = (i + 1) % statuses.length;
            statusEl.classList.remove('fade-in');
            void statusEl.offsetWidth; 
            statusEl.innerText = statuses[i];
            statusEl.classList.add('fade-in');
        }, 1200);
    </script>
</body>
</html>
