<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIL POS - Minimalist</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            overflow: hidden;
            user-select: none;
        }

        .splash-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: #2c3e50;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(44, 62, 80, 0.15);
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            color: #2c3e50;
        }

        p.tagline {
            font-size: 14px;
            color: #7f8c8d;
            margin: 0 0 40px 0;
            font-weight: 400;
        }

        .progress-container {
            width: 200px;
            height: 4px;
            background-color: #ecf0f1;
            margin: 0 auto;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background-color: #3498db;
            border-radius: 2px;
            animation: indeterminate 2s infinite ease-in-out;
        }

        .status-text {
            margin-top: 16px;
            font-size: 12px;
            color: #95a5a6;
        }

        @keyframes indeterminate {
            0% { left: -30%; width: 30%; }
            50% { left: 20%; width: 80%; }
            100% { left: 100%; width: 30%; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-circle">M</div>
        <h1>MIL POS</h1>
        <p class="tagline">Retail Operations Streamlined</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="status-text">Loading Inventory Module...</div>
    </div>
</body>
</html>
