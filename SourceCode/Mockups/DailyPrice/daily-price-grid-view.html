<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Product Price Manager - Grid View</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-bg: #f8f9fc;
            --border-color: #e3e6f0;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--light-bg);
            color: #5a5c69;
        }
        
        .card {
            border: none;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-radius: 0.5rem;
        }
        
        .card-header {
            background-color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h6 {
            margin: 0;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }
        
        .ag-theme-alpine {
            --ag-header-background-color: #f8f9fc;
            --ag-header-foreground-color: #5a5c69;
            --ag-border-color: #e3e6f0;
            --ag-row-hover-color: #f8f9fc;
            font-family: 'Nunito', sans-serif;
        }
        
        .ag-header-cell-label {
            font-weight: 700;
        }
        
        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .status-active {
            background-color: rgba(28, 200, 138, 0.1);
            color: var(--success-color);
        }
        
        .status-inactive {
            background-color: rgba(231, 74, 59, 0.1);
            color: var(--danger-color);
        }
        
        .price-source-base {
            color: var(--secondary-color);
            font-style: italic;
        }
        
        .price-source-daily {
            color: var(--primary-color);
            font-weight: 700;
        }
        
        .price-up {
            color: var(--success-color);
            margin-left: 5px;
        }
        
        .price-down {
            color: var(--danger-color);
            margin-left: 5px;
        }
        
        .filter-section {
            background-color: #fff;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <!-- Page Heading -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Daily Product Price Manager</h1>
            <div>
                <a href="#" class="btn btn-sm btn-info shadow-sm me-2">
                    <i class="fas fa-chart-line fa-sm text-white-50"></i> View Price History
                </a>
                <a href="#" class="btn btn-sm btn-primary shadow-sm">
                    <i class="fas fa-download fa-sm text-white-50"></i> Export Report
                </a>
            </div>
        </div>

        <!-- Filter & Control Section -->
        <div class="filter-section">
            <div class="row align-items-end">
                <div class="col-md-3">
                    <label for="priceDate" class="form-label fw-bold">Select Date</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                        <input type="date" class="form-control" id="priceDate" value="2026-02-01">
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="productSearch" class="form-label fw-bold">Search Product</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="productSearch" placeholder="Name, Code, Barcode...">
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="categoryFilter" class="form-label fw-bold">Category</label>
                    <select class="form-select" id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="grocery">Grocery</option>
                        <option value="clothing">Clothing</option>
                    </select>
                </div>
                <div class="col-md-3 text-end">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-secondary" onclick="copyFromPrevious()">
                            <i class="fas fa-copy me-1"></i> Copy Yesterday's
                        </button>
                        <button type="button" class="btn btn-success" onclick="saveChanges()">
                            <i class="fas fa-save me-1"></i> Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Data Grid -->
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Daily Price List - <span id="currentDateDisplay">Feb 01, 2026</span></h6>
                <div class="small text-muted">Total Products: <b>154</b> | Updated: <b>45</b> | Pending: <b>109</b></div>
            </div>
            <div class="card-body">
                <div id="priceGrid" style="height: 600px; width: 100%;" class="ag-theme-alpine"></div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to copy prices from <strong>Jan 31, 2026</strong>? This will overwrite any unsaved changes.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary">Yes, Copy Prices</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        const rowData = [
            {
                id: '1',
                productName: 'iPhone 15 Pro',
                productCode: 'IP15P-128',
                category: 'Electronics',
                basePrice: 999.00,
                yesterdayPrice: 1049.00,
                todayPrice: 1049.00,
                mrp: 1199.00,
                margin: 14.3,
                priceSource: 'daily',
                status: 'Active',
                lastUpdated: '2026-02-01 09:30 AM'
            },
            {
                id: '2',
                productName: 'Samsung Galaxy S24',
                productCode: 'SGS24-256',
                category: 'Electronics',
                basePrice: 899.00,
                yesterdayPrice: 899.00,
                todayPrice: 899.00,
                mrp: 999.00,
                margin: 10.0,
                priceSource: 'base',
                status: 'Active',
                lastUpdated: 'System Default'
            },
            {
                id: '3',
                productName: 'Organic Milk 1L',
                productCode: 'MILK-ORG-1L',
                category: 'Grocery',
                basePrice: 2.50,
                yesterdayPrice: 2.80,
                todayPrice: 2.95,
                mrp: 3.50,
                margin: 15.7,
                priceSource: 'daily',
                status: 'Active',
                lastUpdated: '2026-02-01 08:15 AM'
            },
            {
                id: '4',
                productName: 'Whole Wheat Bread',
                productCode: 'BRD-WW-500',
                category: 'Grocery',
                basePrice: 1.80,
                yesterdayPrice: 1.80,
                todayPrice: 1.80,
                mrp: 2.20,
                margin: 18.2,
                priceSource: 'base',
                status: 'Active',
                lastUpdated: 'System Default'
            },
            {
                id: '5',
                productName: 'Men\'s Denim Jeans',
                productCode: 'DNM-JEAN-32',
                category: 'Clothing',
                basePrice: 45.00,
                yesterdayPrice: 49.99,
                todayPrice: 49.99,
                mrp: 69.99,
                margin: 28.6,
                priceSource: 'daily',
                status: 'Active',
                lastUpdated: '2026-01-31 05:00 PM'
            }
        ];

        // Grid Configuration
        const gridOptions = {
            rowData: rowData,
            columnDefs: [
                { field: 'productName', headerName: 'Product Name', width: 250, pinned: 'left', filter: true },
                { field: 'productCode', headerName: 'Code', width: 120 },
                { field: 'category', headerName: 'Category', width: 130, filter: true },
                { 
                    field: 'basePrice', 
                    headerName: 'Base Price', 
                    width: 120, 
                    valueFormatter: params => '$' + params.value.toFixed(2),
                    cellStyle: { color: '#858796', fontStyle: 'italic' }
                },
                { 
                    field: 'yesterdayPrice', 
                    headerName: 'Yesterday', 
                    width: 120, 
                    valueFormatter: params => '$' + params.value.toFixed(2) 
                },
                { 
                    field: 'todayPrice', 
                    headerName: 'Today\'s Price', 
                    width: 150, 
                    editable: true,
                    cellEditor: 'agNumberCellEditor',
                    cellStyle: params => {
                        if (params.data.todayPrice > params.data.yesterdayPrice) return { color: '#1cc88a', fontWeight: 'bold', backgroundColor: '#f0fff4' };
                        if (params.data.todayPrice < params.data.yesterdayPrice) return { color: '#e74a3b', fontWeight: 'bold', backgroundColor: '#fff5f5' };
                        return { fontWeight: 'bold', backgroundColor: '#eef2ff' };
                    },
                    valueFormatter: params => '$' + params.value.toFixed(2)
                },
                { 
                    field: 'mrp', 
                    headerName: 'MRP', 
                    width: 120, 
                    editable: true,
                    valueFormatter: params => '$' + params.value.toFixed(2) 
                },
                { 
                    field: 'margin', 
                    headerName: 'Margin %', 
                    width: 120,
                    valueGetter: params => {
                        const price = params.data.todayPrice || 0;
                        const cost = params.data.basePrice * 0.8; // Assuming 20% margin on base
                        return ((price - cost) / price * 100).toFixed(1) + '%';
                    }
                },
                { 
                    field: 'priceSource', 
                    headerName: 'Source', 
                    width: 120,
                    cellRenderer: params => {
                        if (params.value === 'base') return '<span class="badge bg-secondary">Base</span>';
                        return '<span class="badge bg-primary">Daily</span>';
                    }
                },
                { 
                    field: 'lastUpdated', 
                    headerName: 'Last Updated', 
                    width: 180,
                    cellStyle: { fontSize: '0.85rem', color: '#858796' }
                }
            ],
            defaultColDef: {
                sortable: true,
                resizable: true
            },
            rowSelection: 'multiple',
            pagination: true,
            paginationPageSize: 20
        };

        // Initialize Grid
        document.addEventListener('DOMContentLoaded', () => {
            const gridDiv = document.querySelector('#priceGrid');
            new agGrid.Grid(gridDiv, gridOptions);
        });

        // Event Handlers
        document.getElementById('priceDate').addEventListener('change', (e) => {
            const date = new Date(e.target.value);
            document.getElementById('currentDateDisplay').textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            // Here you would typically fetch new data for the selected date
        });

        function copyFromPrevious() {
            var modal = new bootstrap.Modal(document.getElementById('confirmationModal'));
            modal.show();
        }

        function saveChanges() {
            // Show toast or alert
            alert('Price changes saved successfully!');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
