<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Price - Grouped View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4e73df; }
        .group-header { background: #eaecf4; cursor: pointer; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #e3e6f0; }
        .group-header:hover { background: #e3e6f0; }
        .product-row { padding: 8px 15px; border-bottom: 1px solid #e3e6f0; background: white; }
        .price-badge { font-family: monospace; font-size: 1.1em; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between mb-3">
            <h3>Price Management by Category</h3>
            <div class="btn-group">
                <button class="btn btn-outline-primary active">Group by Category</button>
                <button class="btn btn-outline-primary">Group by Brand</button>
            </div>
        </div>

        <!-- Group: Electronics -->
        <div class="card mb-3 shadow-sm">
            <div class="group-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#collapseElec">
                <span><i class="fas fa-microchip me-2"></i> Electronics <span class="badge bg-secondary ms-2">45 Items</span></span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div id="collapseElec" class="collapse show">
                <!-- Product Rows -->
                <div class="product-row d-flex align-items-center justify-content-between">
                    <div style="width: 40%;"><strong>iPhone 15 Pro</strong> <br><small class="text-muted">IP15P-128</small></div>
                    <div style="width: 20%;">Base: $999.00</div>
                    <div style="width: 20%;">Last: $1,049.00</div>
                    <div style="width: 20%;" class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control fw-bold text-success" value="1049.00">
                    </div>
                </div>
                <div class="product-row d-flex align-items-center justify-content-between">
                    <div style="width: 40%;"><strong>Samsung 55" 4K TV</strong> <br><small class="text-muted">TV-SAM-55</small></div>
                    <div style="width: 20%;">Base: $450.00</div>
                    <div style="width: 20%;">Last: $450.00</div>
                    <div style="width: 20%;" class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" value="450.00">
                    </div>
                </div>
            </div>
        </div>

        <!-- Group: Grocery -->
        <div class="card mb-3 shadow-sm">
            <div class="group-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#collapseGroc">
                <span><i class="fas fa-shopping-basket me-2"></i> Grocery <span class="badge bg-secondary ms-2">120 Items</span></span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div id="collapseGroc" class="collapse show">
                <div class="product-row d-flex align-items-center justify-content-between">
                    <div style="width: 40%;"><strong>Organic Milk</strong></div>
                    <div style="width: 20%;">Base: $2.50</div>
                    <div style="width: 20%;">Last: $2.80</div>
                    <div style="width: 20%;" class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control text-danger fw-bold" value="2.90">
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
