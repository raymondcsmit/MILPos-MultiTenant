<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Product Price Manager - Calendar View</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-bg: #f8f9fc;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Nunito', sans-serif;
            color: #5a5c69;
        }

        .card {
            border: none;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-radius: 0.5rem;
        }

        .price-trend-up {
            color: var(--success-color);
        }

        .price-trend-down {
            color: var(--danger-color);
        }

        .fc-daygrid-day-number {
            color: #5a5c69;
            text-decoration: none;
        }
        
        .fc-event {
            cursor: pointer;
        }

        .product-selector {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .product-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .product-item:hover {
            background-color: #eaecf4;
        }
        
        .product-item.active {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 text-gray-800">Price History & Trends</h1>
            <a href="daily-price-grid-view.html" class="btn btn-outline-primary">
                <i class="fas fa-table me-1"></i> Switch to Grid View
            </a>
        </div>

        <div class="row">
            <!-- Product List Sidebar -->
            <div class="col-md-3">
                <div class="card mb-4">
                    <div class="card-header bg-white py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Select Product</h6>
                    </div>
                    <div class="card-body p-2">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-search text-gray-400"></i></span>
                            <input type="text" class="form-control bg-light border-0 small" placeholder="Search for product..." aria-label="Search" aria-describedby="basic-addon2">
                        </div>
                        <div class="product-selector list-group list-group-flush">
                            <a href="#" class="list-group-item list-group-item-action product-item active d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">iPhone 15 Pro</div>
                                    <small>Code: IP15P-128</small>
                                </div>
                                <span class="badge bg-white text-primary">$1,049</span>
                            </a>
                            <a href="#" class="list-group-item list-group-item-action product-item d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">Samsung S24</div>
                                    <small>Code: SGS24-256</small>
                                </div>
                                <span class="badge bg-secondary">$899</span>
                            </a>
                            <a href="#" class="list-group-item list-group-item-action product-item d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">MacBook Air M2</div>
                                    <small>Code: MBA-M2-13</small>
                                </div>
                                <span class="badge bg-secondary">$1,199</span>
                            </a>
                            <!-- More items... -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <!-- Monthly Calendar -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                        <h6 class="m-0 font-weight-bold text-primary">Price Calendar - Feb 2026</h6>
                         <div class="dropdown no-arrow">
                            <a class="dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <i class="fas fa-ellipsis-v fa-sm fa-fw text-gray-400"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="calendar"></div>
                    </div>
                </div>

                <!-- Trend Chart -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Price Analytics (Last 30 Days)</h6>
                    </div>
                    <div class="card-body">
                        <canvas id="priceTrendChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Edit Modal -->
    <div class="modal fade" id="priceEditModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Price for <span id="modalDate"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="modalPrice" class="form-label">Sales Price ($)</label>
                            <input type="number" class="form-control" id="modalPrice" step="0.01">
                        </div>
                        <div class="mb-3">
                            <label for="modalMrp" class="form-label">MRP ($)</label>
                            <input type="number" class="form-control" id="modalMrp" step="0.01">
                        </div>
                         <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isActiveCheck" checked>
                            <label class="form-check-label" for="isActiveCheck">
                                Set as Active Price
                            </label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="alert('Price updated!')">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                },
                events: [
                    { title: '$1049.00', start: '2026-02-01', color: '#1cc88a' },
                    { title: '$1049.00', start: '2026-02-02', color: '#4e73df' }, // Future/Planned
                    { title: '$999.00', start: '2026-01-31', color: '#f6c23e' }, // Past different price
                    { title: '$999.00', start: '2026-01-30', color: '#f6c23e' },
                    // ... more events
                ],
                dateClick: function(info) {
                    var modal = new bootstrap.Modal(document.getElementById('priceEditModal'));
                    document.getElementById('modalDate').innerText = info.dateStr;
                    // Simulate fetching price..
                    document.getElementById('modalPrice').value = "1049.00";
                    modal.show();
                }
            });
            calendar.render();

            // Chart.js Limit Check
            const ctx = document.getElementById('priceTrendChart');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan 1', 'Jan 5', 'Jan 10', 'Jan 15', 'Jan 20', 'Jan 25', 'Jan 30', 'Feb 1'],
                    datasets: [{
                        label: 'Sales Price',
                        data: [999, 999, 1020, 1020, 999, 999, 1049, 1049],
                        borderColor: '#4e73df',
                        tension: 0.1,
                        fill: false
                    },
                    {
                        label: 'Base Price',
                        data: [999, 999, 999, 999, 999, 999, 999, 999],
                        borderColor: '#858796',
                        borderDash: [5, 5],
                        tension: 0,
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
