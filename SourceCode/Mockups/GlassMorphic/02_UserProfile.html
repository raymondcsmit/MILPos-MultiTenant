<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Glassmorphic Mockup</title>
    <link rel="stylesheet" href="mockup-styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <span class="material-icons">inventory_2</span>
                POS System
            </div>
            <nav class="nav-links">
                <a href="01_Dashboard.html" class="nav-item">
                    <span class="material-icons">dashboard</span> Dashboard
                </a>
                <a href="02_UserProfile.html" class="nav-item active">
                    <span class="material-icons">person</span> Profile
                </a>
                <a href="03_DataEntry.html" class="nav-item">
                    <span class="material-icons">add_box</span> Add Product
                </a>
                <a href="05_SearchResults.html" class="nav-item">
                    <span class="material-icons">search</span> Search
                </a>
                <a href="04_Settings.html" class="nav-item">
                    <span class="material-icons">settings</span> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <header class="navbar glass-panel">
                <h2 style="margin: 0; font-weight: 500;">My Profile</h2>
                <div class="user-menu">
                    <span class="avatar">JD</span>
                    <span>John Doe</span>
                    <span class="material-icons">expand_more</span>
                </div>
            </header>

            <div class="content-scroll">
                <div style="display: grid; grid-template-columns: 350px 1fr; gap: 24px;">
                    
                    <!-- Profile Card -->
                    <div class="card glass-panel" style="text-align: center;">
                        <div style="position: relative; margin-bottom: 20px;">
                            <div style="width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 700; border: 4px solid rgba(255,255,255,0.2);">
                                JD
                            </div>
                            <button class="btn btn-secondary" style="position: absolute; bottom: 0; right: 30%; padding: 8px; border-radius: 50%;">
                                <span class="material-icons" style="font-size: 16px;">camera_alt</span>
                            </button>
                        </div>
                        
                        <h2 style="margin: 0 0 8px 0;">John Doe</h2>
                        <p style="color: var(--text-secondary); margin: 0 0 20px 0;">Senior Store Manager</p>
                        
                        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px;">
                            <span class="badge badge-success">Active</span>
                            <span class="badge badge-warning">Admin</span>
                        </div>

                        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; text-align: left;">
                            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                                <span class="material-icons" style="color: var(--text-secondary);">email</span>
                                <span>john.doe@example.com</span>
                            </div>
                            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                                <span class="material-icons" style="color: var(--text-secondary);">phone</span>
                                <span>+1 (555) 123-4567</span>
                            </div>
                            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                                <span class="material-icons" style="color: var(--text-secondary);">location_on</span>
                                <span>New York, USA</span>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Profile Form -->
                    <div class="card glass-panel">
                        <div class="card-header">
                            <h3 class="card-title">Edit Profile</h3>
                            <button class="btn">Save Changes</button>
                        </div>
                        
                        <form>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" value="John">
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" value="Doe">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" value="john.doe@example.com">
                            </div>

                            <div class="form-group">
                                <label>Role</label>
                                <select>
                                    <option>Store Manager</option>
                                    <option>Sales Associate</option>
                                    <option>Inventory Clerk</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Bio</label>
                                <textarea rows="4">Experienced store manager with over 10 years in retail...</textarea>
                            </div>
                            
                            <div class="form-group">
                                <label style="display: flex; align-items: center; gap: 10px;">
                                    <input type="checkbox" checked style="width: auto;">
                                    <span>Subscribe to monthly newsletter</span>
                                </label>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </main>
    </div>
</body>
</html>
