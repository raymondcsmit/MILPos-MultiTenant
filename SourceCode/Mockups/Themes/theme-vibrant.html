<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Vibrant Theme</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --background: #fdf2f8;
            --surface: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #fff;
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .sidebar-header {
            padding: 30px;
            font-size: 26px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .menu-item {
            margin: 5px 15px;
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .menu-item:hover {
            background-color: #f7fafc;
            color: var(--primary-color);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header {
            height: 80px;
            background-color: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
        }

        .content {
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background-color: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 30px;
            margin-bottom: 30px;
            border: none;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(106, 17, 203, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(106, 17, 203, 0.3);
        }
        
        h1, h2, h3 { margin-top: 0; color: #1a202c; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }
        
        .stat-card {
            background: var(--surface);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card h3 { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { font-size: 32px; font-weight: 800; color: #2d3748; margin: 10px 0 0 0; }
        
        /* Decorative circle */
        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            opacity: 0.1;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">POS Vibe</div>
        <div class="menu-item active">Dashboard</div>
        <div class="menu-item">Products</div>
        <div class="menu-item">Sales</div>
        <div class="menu-item">Customers</div>
        <div class="menu-item">Analytics</div>
    </div>
    <div class="main-content">
        <div class="header">
            <h2>Dashboard</h2>
            <div style="flex:1"></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary-gradient);"></div>
                <span style="font-weight: 600;">Alex User</span>
            </div>
        </div>
        <div class="content">
            <div class="grid" style="margin-bottom: 30px;">
                <div class="stat-card">
                    <h3>Total Sales</h3>
                    <p>$12,450</p>
                </div>
                <div class="stat-card">
                    <h3>Orders</h3>
                    <p>45</p>
                </div>
                 <div class="stat-card">
                    <h3>Active Users</h3>
                    <p>120</p>
                </div>
            </div>
        
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Transaction History</h3>
                    <button class="btn btn-primary">View Report</button>
                </div>
                <table style="width: 100%; text-align: left; border-collapse: separate; border-spacing: 0 10px;">
                    <thead>
                        <tr>
                            <th style="padding: 15px; color: var(--text-secondary);">ID</th>
                            <th style="padding: 15px; color: var(--text-secondary);">Customer</th>
                            <th style="padding: 15px; color: var(--text-secondary);">Date</th>
                            <th style="padding: 15px; color: var(--text-secondary);">Amount</th>
                            <th style="padding: 15px; color: var(--text-secondary);">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="background: #f8fafc;">
                            <td style="padding: 15px; border-radius: 10px 0 0 10px;">#1001</td>
                            <td style="padding: 15px; font-weight: 600;">John Doe</td>
                            <td style="padding: 15px;">Oct 25, 2023</td>
                            <td style="padding: 15px;">$120.00</td>
                            <td style="padding: 15px; border-radius: 0 10px 10px 0; color: #48bb78; font-weight: 600;">Completed</td>
                        </tr>
                        <tr style="background: #f8fafc;">
                            <td style="padding: 15px; border-radius: 10px 0 0 10px;">#1002</td>
                            <td style="padding: 15px; font-weight: 600;">Jane Smith</td>
                            <td style="padding: 15px;">Oct 26, 2023</td>
                            <td style="padding: 15px;">$85.50</td>
                            <td style="padding: 15px; border-radius: 0 10px 10px 0; color: #ed8936; font-weight: 600;">Pending</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
             <div class="card">
                <h3>Add New Item</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <input type="text" style="padding: 15px; border: 2px solid #edf2f7; border-radius: 12px; outline: none; transition: border-color 0.2s;" placeholder="Item Name" onfocus="this.style.borderColor='#6a11cb'" onblur="this.style.borderColor='#edf2f7'">
                    <select style="padding: 15px; border: 2px solid #edf2f7; border-radius: 12px; outline: none;">
                        <option>Select Category</option>
                        <option>Digital</option>
                        <option>Physical</option>
                    </select>
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" style="width: 100%;">Create Item</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
