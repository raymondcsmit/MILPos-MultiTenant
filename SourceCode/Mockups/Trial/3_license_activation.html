<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Activate License</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .activation-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .logo-area i {
            font-size: 3rem;
            color: #00bcd4;
            margin-bottom: 10px;
        }
        .form-label {
            font-weight: 600;
            color: #555;
        }
        .form-control-lg {
            border-radius: 10px;
            font-family: monospace;
            letter-spacing: 1px;
            text-align: center;
            border: 2px solid #eee;
        }
        .form-control-lg:focus {
            border-color: #00bcd4;
            box-shadow: 0 0 0 0.2rem rgba(0, 188, 212, 0.25);
        }
        .btn-validate {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-validate:hover {
            background: #0097a7;
            transform: translateY(-2px);
        }
        .support-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .support-link a {
            color: #00bcd4;
            text-decoration: none;
        }
        
        /* Loading & Success States */
        .loading-overlay, .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none; /* Hidden by default */
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: #00bcd4;
        }

        .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="activation-card">
        <div class="logo-area">
            <i class="fas fa-shield-alt"></i>
            <h3>Activate License</h3>
            <p class="text-muted">Enter your product key to unlock full features</p>
        </div>

        <form id="activationForm" onsubmit="simulateValidation(event)">
            <div class="mb-3">
                <label for="licenseKey" class="form-label">License Key</label>
                <input type="text" class="form-control form-control-lg" id="licenseKey" 
                       placeholder="XXXX-XXXX-XXXX-XXXX" required>
                <div class="form-text text-center mt-2">
                    Format: 8-4-4-4-12 characters (UUID)
                </div>
            </div>
            <button type="submit" class="btn btn-validate">
                <i class="fas fa-check-circle me-2"></i>Validate License
            </button>
        </form>

        <div class="support-link">
            <p>Don't have a key? <a href="#">Purchase License</a> or <a href="#">Contact Support</a></p>
        </div>

        <!-- Loading State -->
        <div class="loading-overlay" id="loadingState">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 fw-bold text-secondary">Verifying License...</p>
        </div>

        <!-- Success State -->
        <div class="success-overlay" id="successState">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Activation Successful!</h3>
            <p class="text-muted mb-4">Thank you for your purchase.</p>
            <button class="btn btn-primary px-4" onclick="window.location.href='1_trial_active.html'">
                Continue to Dashboard
            </button>
        </div>
    </div>

    <script>
        function simulateValidation(e) {
            e.preventDefault();
            const key = document.getElementById('licenseKey').value;
            
            // Show loading
            document.getElementById('loadingState').style.display = 'flex';

            // Simulate API delay
            setTimeout(() => {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('successState').style.display = 'flex';
            }, 2000);
        }
    </script>

</body>
</html>
