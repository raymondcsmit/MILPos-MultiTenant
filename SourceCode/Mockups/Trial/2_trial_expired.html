<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Trial Expired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00bcd4;
            --secondary-color: #ff9800;
            --sidebar-width: 250px;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }
        /* Blurred Background Elements */
        .sidebar, .main-content {
            filter: blur(5px);
            pointer-events: none; /* Disable interaction */
            user-select: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
        }
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: 0.3s;
        }
        .sidebar-menu li a:hover, .sidebar-menu li a.active {
            background-color: rgba(255,255,255,0.1);
            border-left: 4px solid var(--primary-color);
        }
        .sidebar-menu li a i {
            margin-right: 10px;
            width: 20px;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px;
        }
        
        /* BLOCKING OVERLAY */
        .blocking-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .expired-card {
            background: white;
            width: 500px;
            border-radius: 15px;
            padding: 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInDown 0.5s ease-out;
            text-align: center;
        }

        .expired-header {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            padding: 30px;
        }

        .expired-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .expired-body {
            padding: 30px;
        }

        .expired-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .expired-text {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-activate {
            background: #28a745;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .btn-activate:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-contact {
            background: white;
            color: #666;
            border: 2px solid #ddd;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .btn-contact:hover {
            border-color: #aaa;
            color: #333;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Blurred Background Content (Same as Dashboard) -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-cash-register me-2"></i>SmartPOS</h3>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-box"></i> Inventory</a></li>
            <li><a href="#"><i class="fas fa-shopping-cart"></i> Sales</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Dashboard</h2>
            <div class="user-profile"><i class="fas fa-user-circle fa-2x"></i></div>
        </div>
        <!-- Sample content to show blur effect -->
        <div class="row g-4 mb-4">
            <div class="col-md-3"><div class="card p-5 bg-white border-0 shadow-sm"></div></div>
            <div class="col-md-3"><div class="card p-5 bg-white border-0 shadow-sm"></div></div>
            <div class="col-md-3"><div class="card p-5 bg-white border-0 shadow-sm"></div></div>
            <div class="col-md-3"><div class="card p-5 bg-white border-0 shadow-sm"></div></div>
        </div>
        <div class="card p-5 bg-white border-0 shadow-sm" style="height: 300px;"></div>
    </div>

    <!-- BLOCKING OVERLAY -->
    <div class="blocking-overlay">
        <div class="expired-card">
            <div class="expired-header">
                <div class="expired-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h2>Trial Period Expired</h2>
            </div>
            <div class="expired-body">
                <p class="expired-title">Your 14-day trial has ended.</p>
                <p class="expired-text">
                    Thank you for trying SmartPOS. To continue using the application and access your data, please activate your license key.
                </p>
                <button class="btn btn-activate" onclick="window.location.href='3_license_activation.html'">
                    <i class="fas fa-key me-2"></i>Enter License Key
                </button>
                <button class="btn btn-contact">
                    <i class="fas fa-envelope me-2"></i>Contact Support
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
