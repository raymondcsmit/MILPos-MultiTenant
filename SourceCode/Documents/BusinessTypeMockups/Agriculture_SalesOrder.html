<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agriculture Sales Order - Mockup</title>
    <!-- Using Bootstrap 5 for layout to match existing app structure -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; font-family: Roboto, "Helvetica Neue", sans-serif; }
        .page-title { font-size: 24px; font-weight: 500; color: #333; }
        .card { border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 4px; }
        .table-pos thead th { background-color: #e8f5e9; color: #2e7d32; font-weight: 600; font-size: 0.85rem; } /* Agri Theme Green */
        .form-label { font-size: 0.85rem; font-weight: 500; color: #666; }
        .btn-primary { background-color: #2e7d32; border-color: #2e7d32; } /* Green Buttons */
        .text-danger { color: #f44336 !important; }
        .grid-img-thumbnail { width: 50px; height: 50px; object-fit: cover; }
    </style>
</head>
<body class="p-3">

<div class="container-fluid">
    <!-- Header -->
    <div class="d-flex mb-3 align-items-center">
        <div class="me-auto">
            <span class="page-title">Manage Sales Orders <small class="text-muted">(Agriculture Mode)</small></span>
        </div>
    </div>

    <!-- Main Form -->
    <div class="card p-4">
        <div class="row g-3">
            <!-- Order Info -->
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">SO Number *</label>
                <input type="text" class="form-control" value="AGRI-2026-0055">
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Order Date *</label>
                <input type="date" class="form-control" value="2026-01-28">
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Delivery Date *</label>
                <input type="date" class="form-control" value="2026-01-30">
            </div>

            <!-- Customer & Location -->
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Customer (Farmer) *</label>
                <div class="input-group">
                    <select class="form-select">
                        <option>Ali Ahmed (Farmer)</option>
                        <option>Walk-in</option>
                    </select>
                    <button class="btn btn-primary"><span class="material-icons align-middle fs-6">add</span></button>
                </div>
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Business Location *</label>
                <select class="form-select">
                    <option selected>Agri Depot #1</option>
                </select>
            </div>
        </div>

        <!-- Product Search -->
        <div class="row my-4">
            <div class="col-lg-6">
                <div class="input-group">
                    <button class="btn btn-primary"><span class="material-icons align-middle">search</span></button>
                    <input type="text" class="form-control" placeholder="Search Seeds, Fertilizers...">
                </div>
            </div>
            <div class="col-lg-6">
                <div class="input-group">
                    <button class="btn btn-primary"><span class="material-icons align-middle">view_week</span></button>
                    <input type="text" class="form-control" placeholder="Scan Barcode">
                </div>
            </div>
        </div>

        <!-- Order Items Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-pos align-middle">
                <thead>
                    <tr>
                        <th style="width: 25%">Product</th>
                        <th style="width: 15%" class="table-info">Batch / Lot #</th> <!-- Agri uses Lots/Batches -->
                        <th style="width: 15%">Price & Unit</th>
                        <th style="width: 10%">Quantity</th>
                        <th style="width: 10%">Discount</th>
                        <th style="width: 10%">Tax</th>
                        <th style="width: 10%">Total</th>
                        <th style="width: 5%">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Item 1 -->
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <img src="https://via.placeholder.com/50?text=Fert" class="grid-img-thumbnail rounded">
                                <div>
                                    <div class="fw-bold">Urea Fertilizer</div>
                                    <small class="text-muted">Engro</small>
                                </div>
                            </div>
                        </td>
                        <!-- BATCH/LOT FIELDS -->
                        <td class="bg-light">
                            <label class="form-label small mb-1">Lot #</label>
                            <input type="text" class="form-control form-control-sm mb-2" value="LOT-9988">
                             <label class="form-label small mb-1">Expiry</label>
                            <input type="date" class="form-control form-control-sm" value="2027-05-01">
                        </td>
                        <td>
                            <label class="form-label small mb-1">Price</label>
                            <input type="number" class="form-control form-control-sm mb-2" value="3500.00">
                            <label class="form-label small mb-1">Unit</label>
                            <select class="form-select form-select-sm">
                                <option>Bag (50kg)</option>
                            </select>
                        </td>
                        <td>
                            <input type="number" class="form-control form-control-sm" value="10">
                        </td>
                        <td>
                            <div class="input-group input-group-sm mb-1">
                                <div class="input-group-text">
                                    <input class="form-check-input mt-0" type="radio" name="disc1"> Fixed
                                </div>
                                <input type="text" class="form-control" value="0">
                            </div>
                        </td>
                        <td>
                            <select class="form-select form-select-sm" multiple>
                                <option>None</option>
                            </select>
                        </td>
                        <td class="fw-bold text-end">35,000.00</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger"><span class="material-icons fs-6">delete</span></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Footer Totals -->
        <div class="row mt-3 justify-content-end">
            <div class="col-lg-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Sub Total:</span>
                    <span>35,000.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Total Tax:</span>
                    <span>0.00</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-3">
                    <span class="fw-bold fs-5">Grand Total:</span>
                    <span class="fw-bold fs-5">35,000.00</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2">
            <button class="btn btn-success"><span class="material-icons align-middle">save</span> Save</button>
            <button class="btn btn-warning text-white"><span class="material-icons align-middle">payment</span> Save & Pay</button>
            <button class="btn btn-danger"><span class="material-icons align-middle">cancel</span> Cancel</button>
        </div>
    </div>
</div>

</body>
</html>
