<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Sales Order - Mockup</title>
    <!-- Using Bootstrap 5 for layout to match existing app structure -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; font-family: Roboto, "Helvetica Neue", sans-serif; }
        .page-title { font-size: 24px; font-weight: 500; color: #333; }
        .card { border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 4px; }
        .table-pos thead th { background-color: #f3f3f3; color: #555; font-weight: 600; font-size: 0.85rem; }
        .form-label { font-size: 0.85rem; font-weight: 500; color: #666; }
        .btn-primary { background-color: #3f51b5; border-color: #3f51b5; }
        .text-danger { color: #f44336 !important; }
        .grid-img-thumbnail { width: 50px; height: 50px; object-fit: cover; }
    </style>
</head>
<body class="p-3">

<div class="container-fluid">
    <!-- Header -->
    <div class="d-flex mb-3 align-items-center">
        <div class="me-auto">
            <span class="page-title">Manage Sales Orders <small class="text-muted">(Pharmacy Mode)</small></span>
        </div>
    </div>

    <!-- Main Form -->
    <div class="card p-4">
        <div class="row g-3">
            <!-- Order Info -->
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">SO Number *</label>
                <input type="text" class="form-control" value="SO-2026-0001">
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Order Date *</label>
                <input type="date" class="form-control" value="2026-01-28">
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Delivery Date *</label>
                <input type="date" class="form-control" value="2026-01-30">
            </div>

            <!-- Customer & Location -->
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Customer Name *</label>
                <div class="input-group">
                    <select class="form-select">
                        <option>Walk-in Customer</option>
                        <option>John Doe</option>
                    </select>
                    <button class="btn btn-primary"><span class="material-icons align-middle fs-6">add</span></button>
                </div>
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Business Location *</label>
                <select class="form-select">
                    <option selected>Main Pharma Branch</option>
                </select>
            </div>
            <div class="col-lg-4 col-sm-6">
                <label class="form-label text-danger">Delivery Status *</label>
                <select class="form-select">
                    <option>Delivered</option>
                    <option>Pending</option>
                </select>
            </div>
        </div>

        <!-- Product Search -->
        <div class="row my-4">
            <div class="col-lg-6">
                <div class="input-group">
                    <button class="btn btn-primary"><span class="material-icons align-middle">search</span></button>
                    <input type="text" class="form-control" placeholder="Search by Name (e.g. Panadol)">
                </div>
            </div>
            <div class="col-lg-6">
                <div class="input-group">
                    <button class="btn btn-primary"><span class="material-icons align-middle">view_week</span></button>
                    <input type="text" class="form-control" placeholder="Scan Barcode">
                </div>
            </div>
        </div>

        <!-- Order Items Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-pos align-middle">
                <thead>
                    <tr>
                        <th style="width: 25%">Product</th>
                        <th style="width: 15%" class="table-info">Batch Info (Pharmacy)</th> <!-- NEW COLUMN -->
                        <th style="width: 15%">Price & Unit</th>
                        <th style="width: 10%">Quantity</th>
                        <th style="width: 10%">Discount</th>
                        <th style="width: 10%">Tax</th>
                        <th style="width: 10%">Total</th>
                        <th style="width: 5%">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Item 1 -->
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <img src="https://via.placeholder.com/50" class="grid-img-thumbnail rounded">
                                <div>
                                    <div class="fw-bold">Panadol Extra</div>
                                    <small class="text-muted">Tablets</small>
                                </div>
                            </div>
                        </td>
                        <!-- NEW BATCH FIELDS -->
                        <td class="bg-light">
                            <label class="form-label small mb-1">Batch #</label>
                            <select class="form-select form-select-sm mb-2">
                                <option>B-1029 (Exp: Dec 2026)</option>
                                <option>B-1030 (Exp: Jan 2027)</option>
                            </select>
                            <label class="form-label small mb-1">Expiry</label>
                            <input type="date" class="form-control form-control-sm" value="2026-12-31" readonly> <!-- Auto-filled from Batch -->
                        </td>
                        <td>
                            <label class="form-label small mb-1">Price</label>
                            <input type="number" class="form-control form-control-sm mb-2" value="10.00">
                            <label class="form-label small mb-1">Unit</label>
                            <select class="form-select form-select-sm">
                                <option>Pack</option>
                                <option>Strip</option>
                            </select>
                        </td>
                        <td>
                            <input type="number" class="form-control form-control-sm" value="2">
                        </td>
                        <td>
                            <div class="input-group input-group-sm mb-1">
                                <div class="input-group-text">
                                    <input class="form-check-input mt-0" type="radio" checked name="disc1"> %
                                </div>
                                <input type="text" class="form-control" value="0">
                            </div>
                        </td>
                        <td>
                            <select class="form-select form-select-sm" multiple>
                                <option>GST (17%)</option>
                            </select>
                        </td>
                        <td class="fw-bold text-end">20.00</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger"><span class="material-icons fs-6">delete</span></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Footer Totals -->
        <div class="row mt-3 justify-content-end">
            <div class="col-lg-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Sub Total:</span>
                    <span>20.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Total Tax:</span>
                    <span>3.40</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-bold">Total Discount:</span>
                    <span class="text-danger">0.00</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-3">
                    <span class="fw-bold fs-5">Grand Total:</span>
                    <span class="fw-bold fs-5">23.40</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2">
            <button class="btn btn-success"><span class="material-icons align-middle">save</span> Save</button>
            <button class="btn btn-warning text-white"><span class="material-icons align-middle">payment</span> Save & Pay</button>
            <button class="btn btn-danger"><span class="material-icons align-middle">cancel</span> Cancel</button>
        </div>
    </div>
</div>

</body>
</html>
