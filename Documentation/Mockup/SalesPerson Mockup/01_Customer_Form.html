<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">

<div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
    <!-- Header -->
    <div class="bg-indigo-600 px-6 py-4 flex justify-between items-center text-white">
        <div class="flex items-center space-x-3">
            <button class="hover:bg-indigo-700 p-2 rounded-full transition-colors">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-semibold">Create New Customer</h1>
        </div>
        <button class="bg-white text-indigo-600 px-4 py-2 rounded font-medium hover:bg-gray-100 transition-colors shadow-sm">
            <i class="fas fa-save mr-2"></i> Save Customer
        </button>
    </div>

    <div class="p-6 space-y-8">
        <!-- Basic Info -->
        <section>
            <h2 class="text-lg font-medium text-gray-800 border-b pb-2 mb-4">Basic Information</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name <span class="text-red-500">*</span></label>
                    <input type="text" value="John Doe" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" value="john.doe@example.com" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="text" value="+1 555-0192" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tax/VAT Number</label>
                    <input type="text" value="123456789" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
        </section>

        <!-- Billing & Shipping -->
        <section>
            <h2 class="text-lg font-medium text-gray-800 border-b pb-2 mb-4">Billing & Shipping</h2>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Billing Address</label>
                    <textarea rows="2" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">123 Main St, New York, NY</textarea>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="sameAddress" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="sameAddress" class="ml-2 block text-sm text-gray-900">Shipping Address is same as Billing Address</label>
                </div>
            </div>
        </section>

        <!-- Territory & Assignment (NEW) -->
        <section class="bg-indigo-50 p-4 rounded-lg border border-indigo-100">
            <div class="flex items-center space-x-2 mb-4 border-b border-indigo-200 pb-2">
                <i class="fas fa-map-marker-alt text-indigo-600"></i>
                <h2 class="text-lg font-medium text-indigo-900">Territory & Assignment (New Requirement)</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-indigo-900 mb-1">Dedicated Region</label>
                    <select class="w-full border border-indigo-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option>Select Region...</option>
                        <option selected>North America - East</option>
                        <option>North America - West</option>
                        <option>Europe - Central</option>
                    </select>
                    <p class="text-xs text-indigo-600 mt-1">Filters available Sales Reps below.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-indigo-900 mb-1">Assigned Sales Rep</label>
                    <div class="relative">
                        <select class="w-full border border-indigo-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white appearance-none pr-8">
                            <option>Select Sales Rep...</option>
                            <option selected>Michael Scott</option>
                            <option>Jim Halpert</option>
                            <option>Pam Beesly</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-indigo-700">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    <div class="mt-2 flex items-start space-x-2 bg-yellow-50 p-2 rounded border border-yellow-200">
                        <i class="fas fa-info-circle text-yellow-600 mt-0.5"></i>
                        <p class="text-xs text-yellow-800 leading-tight">If logged in as a Sales Person (e.g. Michael Scott), this dropdown is automatically locked to prevent assigning customers to other reps.</p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

</body>
</html>
